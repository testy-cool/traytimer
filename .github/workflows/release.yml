name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pillow pystray pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --noconsole --name TaskbarTimer timer.py

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TaskbarTimer.exe
          generate_release_notes: true
